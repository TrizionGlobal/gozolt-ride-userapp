name: gozolt_user_app
description: "Gozolt - The Super App. Ride-hailing user app for Malta/EU."
publish_to: 'none'
version: 1.0.1+28

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0

  # Secure Storage
  flutter_secure_storage: ^9.2.4

  # UI
  smooth_page_indicator: ^1.2.0+3
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.8

  # Serialization
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.1

  # Internationalization
  intl: any

  # URL Launcher
  url_launcher: ^6.3.1

  # Local Storage
  shared_preferences: ^2.2.0

  # Maps & Location
  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  permission_handler: ^11.3.1

  # Real-time
  socket_io_client: ^3.0.2

  # Payments
  flutter_stripe: ^10.1.1

  # Image picker (will be used in later phases)
  # image_picker: ^1.1.2

  # Share
  share_plus: ^10.1.4

  # Social Login
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0
  image_picker: ^1.0.0
  universal_io: ^2.2.2

  # Firebase
  firebase_core: ^3.11.0
  firebase_messaging: ^15.2.10
  firebase_auth: ^5.5.0
  firebase_app_check: ^0.3.2+10
  flutter_svg: ^2.1.0
  image_cropper: ^12.2.1
  google_fonts: ^8.1.0
  flutter_contacts: ^2.1.0
  printing: ^5.14.3
  pdf: ^3.12.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.4.1
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.3.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/Gozolt_User_Icon.png"
  adaptive_icon_background: "#092646"
  adaptive_icon_foreground: "assets/images/Gozolt_User_Icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter_native_splash:
  color: "#F6F8FA"
  image: "assets/images/light_Gozolt_User_Icon.png"
  color_dark: "#0D1117"
  image_dark: "assets/images/Gozolt_User_Icon.png"
  android_12:
    color: "#F6F8FA"
    image: "assets/images/light_Gozolt_User_Icon.png"
    color_dark: "#0D1117"
    image_dark: "assets/images/Gozolt_User_Icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/

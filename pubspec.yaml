name: gozolt_user_app
description: "Gozolt - The Super App. Ride-hailing user app for Malta/EU."
publish_to: 'none'
version: 1.0.0+27

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0

  # Secure Storage
  flutter_secure_storage: ^9.2.4

  # UI
  smooth_page_indicator: ^1.2.0+3
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.8

  # Serialization
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4

  # Internationalization
  intl: any

  # URL Launcher
  url_launcher: ^6.3.1

  # Local Storage
  shared_preferences: ^2.3.4

  # Maps & Location
  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  permission_handler: ^11.3.1

  # Real-time
  socket_io_client: ^3.0.2

  # Payments
  flutter_stripe: ^11.3.0

  # Image picker (will be used in later phases)
  # image_picker: ^1.1.2

  # Share
  share_plus: ^10.1.4

  # Social Login
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0
  image_picker: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/App_Icone_01.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/App_Icone_01.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter_native_splash:
  color: "#000000"
  android_12:
    color: "#000000"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
